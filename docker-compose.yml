version: "3.9"

services:
  # ── Web (production-like static build served by Nginx) ───────
  ecoplay-web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: ecoplay-web
    ports:
      - "8080:80"          # → http://localhost:8080
    restart: unless-stopped

  # ── Dev server (hot-reload, Expo Metro bundler) ──────────────
  ecoplay-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ecoplay-dev
    ports:
      - "8081:8081"        # → http://localhost:8081
    volumes:
      - .:/app             # live reload: mount the whole project
      - /app/node_modules  # keep container node_modules isolated
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    profiles:
      - dev                # only started with: docker compose --profile dev up
